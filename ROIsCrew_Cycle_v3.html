<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROIs Crew Business Cycle</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500;600&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: radial-gradient(ellipse at 55% 45%, #dde4f0 0%, #c4cfdf 50%, #aab8cc 100%);
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    font-family:'Barlow',sans-serif; user-select:none; overflow:hidden;
  }
  .layout { display:flex; align-items:center; gap:20px; }
  .scene { position:relative; width:700px; height:700px; flex-shrink:0; }
  canvas { position:absolute; inset:0; cursor:grab; }
  canvas.dragging { cursor:grabbing; }

  .center-label {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    text-align:center; pointer-events:none; z-index:10;
  }
  .center-label .main {
    font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:38px;
    color:#0a1e3d; letter-spacing:1px; line-height:1; display:block;
  }
  .center-label .sub {
    font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:500;
    color:#3a5080; letter-spacing:2px; text-transform:uppercase;
    display:block; margin-top:4px; opacity:0.8;
  }
  .center-label .hint {
    font-size:9px; color:#6a7ea0; letter-spacing:1px; margin-top:7px;
    display:block; animation:pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:.9} }

  .spin-controls {
    position:absolute; bottom:-44px; left:50%; transform:translateX(-50%);
    display:flex; gap:10px;
  }
  .spin-btn {
    background:rgba(255,255,255,.75); border:1px solid rgba(180,195,220,.6);
    border-radius:20px; padding:6px 14px;
    font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:600;
    letter-spacing:1.5px; color:#2a3a5a; cursor:pointer; text-transform:uppercase;
    transition:background .2s;
  }
  .spin-btn:hover { background:rgba(255,255,255,.95); }
  .spin-btn.active { background:#0a1e3d; color:#fff; }

  /* Detail panel */
  .detail-panel {
    width:300px; min-height:440px;
    background:rgba(255,255,255,.93); backdrop-filter:blur(14px);
    border-radius:18px; padding:0 0 24px;
    box-shadow:0 20px 60px rgba(0,20,60,.18), 0 0 0 1px rgba(255,255,255,.7);
    overflow:hidden; flex-shrink:0;
  }
  .dp-header {
    padding:20px 22px 16px; border-radius:18px 18px 0 0;
    background:var(--accent,#0055a5); position:relative; overflow:hidden;
  }
  .dp-header::after {
    content:''; position:absolute; right:-20px; bottom:-20px;
    width:90px; height:90px; border-radius:50%; background:rgba(255,255,255,.1);
  }
  .dp-cat { display:inline-block; font-family:'Barlow Condensed',sans-serif;
    font-size:9px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase;
    color:rgba(255,255,255,.8); background:rgba(255,255,255,.18);
    border-radius:20px; padding:3px 10px; margin-bottom:8px;
  }
  .dp-step { font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:600;
    letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,.7); margin-bottom:4px;
  }
  .dp-title { font-family:'Barlow Condensed',sans-serif; font-size:26px; font-weight:700;
    color:#fff; letter-spacing:.5px; line-height:1.1;
  }
  .dp-body { padding:18px 22px 0; }
  .dp-desc { font-size:12.5px; color:#445566; line-height:1.65; margin-bottom:16px; }
  .dp-feat-title { font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700;
    letter-spacing:2.5px; text-transform:uppercase; color:#8899aa; margin-bottom:10px;
  }
  .dp-feats { list-style:none; display:flex; flex-direction:column; gap:7px; }
  .dp-feats li { display:flex; align-items:flex-start; gap:9px; font-size:12px; color:#334455; line-height:1.5; }
  .dp-feats li::before { content:''; width:6px; height:6px; border-radius:50%;
    background:var(--accent,#0055a5); flex-shrink:0; margin-top:5px; transition:background .4s;
  }
  @keyframes panelIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .panel-content { animation:panelIn .22s ease both; }
  @keyframes fadeIn { from{opacity:0;transform:scale(.97)} to{opacity:1;transform:scale(1)} }
  .layout { animation:fadeIn .7s ease both; }
</style>
</head>
<body>
<div class="layout">
  <div class="scene">
    <canvas id="cv" width="700" height="700"></canvas>
    <div class="center-label">
      <span class="main">ROIs<br>Crew</span>
      <span class="sub">Crew Management Flow</span>
      <span class="hint">↺ drag to spin</span>
    </div>
    <div class="spin-controls">
      <button class="spin-btn" id="btnCCW">◀ CCW</button>
      <button class="spin-btn active" id="btnStop">■ Stop</button>
      <button class="spin-btn" id="btnCW">CW ▶</button>
    </div>
  </div>

  <div class="detail-panel" id="dp" style="--accent:#0055a5">
    <div class="panel-content" id="pc"></div>
  </div>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────
const CATS = [
  { label:'Long Term',        start:0, count:2, ringColor:'rgba(0,185,200,0.55)',  trackFill:'rgba(0,185,200,0.12)' },
  { label:'Short Term',       start:2, count:4, ringColor:'rgba(240,130,0,0.55)',  trackFill:'rgba(240,130,0,0.10)' },
  { label:'Day of Operation', start:6, count:3, ringColor:'rgba(76,175,80,0.55)',  trackFill:'rgba(76,175,80,0.10)' },
];

const SEGS = [
  { name:'Manpower\nPlanning', label:'Manpower Planning', step:'Step 01',
    cat:'Long Term', color:'#00b4c4', badgeCol:'#40d8e2',
    g:['#40e0ea','#007b8a'],
    icon:'M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v2h20v-2c0-3.3-6.7-5-10-5z',
    desc:'Long-term strategic workforce planning ensuring optimal crew availability for all flight operations.',
    feats:['Demand & availability forecasting','Operation history summary','Flight network analysis','Promotion & recruitment planning','Standby & leave balancing'] },
  { name:'Legality\nEngine', label:'Legality Engine', step:'Step 02',
    cat:'Long Term', color:'#007080', badgeCol:'#009baa',
    g:['#009baa','#004d57'],
    icon:'M12 1L3 5v6c0 5.5 3.8 10.7 9 12 5.2-1.3 9-6.5 9-12V5l-9-4zm-1 14l-3-3 1.4-1.4 1.6 1.6 4.6-4.6L17 9l-6 6z',
    desc:'Industry-grade regulatory compliance engine ensuring all crew assignments meet global aviation standards.',
    feats:['FAA 117 & EASA compliance','Highly configurable rule sets','High-performance processing','Internal & external API service','Cost optimization built-in'] },
  { name:'Pairing\nOptimizer', label:'Pairing Optimizer', step:'Step 03',
    cat:'Short Term', color:'#f9b825', badgeCol:'#ffe082',
    g:['#ffe082','#f9a825'],
    icon:'M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z',
    desc:'ML-powered pairing engine balancing cost, crew utilization and fatigue across multiple bases simultaneously.',
    feats:['Machine learning powered','Multiple bases optimization','Multi-goal: cost, utilization, fatigue','Flexible daily/monthly/seasonal modes','Crew preference integration'] },
  { name:'Training\nOptimizer', label:'Training Optimizer', step:'Step 04',
    cat:'Short Term', color:'#f08000', badgeCol:'#ffb300',
    g:['#ffb300','#e65100'],
    icon:'M5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82zM12 3L1 9l11 6 9-4.91V17h2V9L12 3z',
    desc:'Automated training lifecycle management ensuring crew recency and regulatory compliance are always maintained.',
    feats:['Training / days-off automation','Approval & assignment automation','Specific duty preference support','Recency reassignment','Fatigue-aware scheduling'] },
  { name:'PBS', label:'Preference Bidding System', step:'Step 05',
    cat:'Short Term', color:'#d05000', badgeCol:'#ff8f00',
    g:['#ff8f00','#bf360c'],
    icon:'M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z',
    desc:'Crew preference bidding system empowering staff to express scheduling preferences within operational constraints.',
    feats:['Crew preference bidding','Roster inquiry & real-time alerts','Crew info self-service portal','e-Logbook integration','Fair & transparent allocation'] },
  { name:'Roster\nOptimizer', label:'Roster Optimizer', step:'Step 06',
    cat:'Short Term', color:'#a03800', badgeCol:'#e65100',
    g:['#e65100','#7f2800'],
    icon:'M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z',
    desc:'Intelligent rostering engine that builds compliant, cost-efficient rosters while balancing crew wellbeing.',
    feats:['Half pairing optimization','Flexible daily, monthly & seasonal modes','Training optimization integration','Fatigue risk management','Preference bidding alignment'] },
  { name:'Tracking', label:'Tracking', step:'Step 07',
    cat:'Day of Operation', color:'#3aaa3e', badgeCol:'#80e27e',
    g:['#80e27e','#2e7d32'],
    icon:'M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z',
    desc:'Real-time crew tracking and operational recovery platform with full disruption management capabilities.',
    feats:['Real-time crew tracking','What-if simulation engine','Disruption recommendation','Trip trade management','Logbook handling & GD/APIS'] },
  { name:'Crew APP', label:'Crew APP', step:'Step 08',
    cat:'Day of Operation', color:'#2e7d32', badgeCol:'#4caf50',
    g:['#4caf50','#1b5e20'],
    icon:'M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z',
    desc:'Mobile-first self-service app giving crew members full visibility and control over their schedule anytime.',
    feats:['Roster inquiry & push notifications','Crew absent automation','Trip trade requests','e-Logbook mobile entry','Real-time flight status'] },
  { name:'Crew Care', label:'Crew Care', step:'Step 09',
    cat:'Day of Operation', color:'#1b5e20', badgeCol:'#1e8e22',
    g:['#1e8e22','#0a3d0c'],
    icon:'M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z',
    desc:'Comprehensive crew welfare platform managing hotel, transport, meals and logistic vendor services end-to-end.',
    feats:['Hotel, transport & meal self-service','Pandemic touch-less service mode','e-Invoice for logistic vendors','Fatigue management integration','Vendor performance reporting'] },
];

// ─── CANVAS SETUP ────────────────────────────────────────────────────────────
const cv   = document.getElementById('cv');
const ctx  = cv.getContext('2d');
const W=700, H=700, CX=350, CY=350;
const R_OUT=300, R_IN=148, R_BADGE=170, BADGE_R=16;
const N=SEGS.length, SLICE=Math.PI*2/N;
const GAP=0.022;
const START_ANGLE = -70 * Math.PI/180; // seg0 mid at top-right

// Pre-parse icon paths for canvas drawing
const iconPaths = SEGS.map(s => new Path2D(s.icon.split('z').join('Z')));

// Pre-build gradients — radial per segment
function makeGrad(midAngle, col1, col2) {
  const mx = CX + (R_OUT+R_IN)/2 * Math.cos(midAngle);
  const my = CY + (R_OUT+R_IN)/2 * Math.sin(midAngle);
  const gr = ctx.createRadialGradient(mx, my, 10, CX, CY, R_OUT);
  gr.addColorStop(0, col1);
  gr.addColorStop(1, col2);
  return gr;
}

// ─── STATE ───────────────────────────────────────────────────────────────────
let wheelAngle = 0;
let autoSpin   = 0;
let velocity   = 0;
let hoveredIdx = -1;
let pinnedIdx  = 0;
let isDragging = false;
let dragStartAngle = 0;
let dragLastAngle  = 0;
let dragVel        = 0;
let lastDragTime   = 0;
let lastTime       = null;
let wasDragging    = false;

// ─── HIT TEST ────────────────────────────────────────────────────────────────
function hitTest(ex, ey) {
  const dx = ex - CX, dy = ey - CY;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < R_IN || dist > R_OUT) return -1;
  // Angle in world coords (subtract wheelAngle to get local)
  let a = Math.atan2(dy, dx) - wheelAngle;
  // Normalize to [0, 2π)
  a = ((a % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
  for (let i=0; i<N; i++) {
    const sa = ((START_ANGLE + i*SLICE + GAP) % (Math.PI*2) + Math.PI*2) % (Math.PI*2);
    const ea = ((START_ANGLE + (i+1)*SLICE - GAP) % (Math.PI*2) + Math.PI*2) % (Math.PI*2);
    if (sa < ea) {
      if (a >= sa && a <= ea) return i;
    } else {
      if (a >= sa || a <= ea) return i;
    }
  }
  return -1;
}

function getEventAngle(e) {
  const rect = cv.getBoundingClientRect();
  const sx = W / rect.width, sy = H / rect.height;
  const x = (e.clientX - rect.left) * sx - CX;
  const y = (e.clientY - rect.top)  * sy - CY;
  return Math.atan2(y, x);
}

function getEventPos(e) {
  const rect = cv.getBoundingClientRect();
  const sx = W / rect.width, sy = H / rect.height;
  return {
    x: (e.clientX - rect.left) * sx,
    y: (e.clientY - rect.top)  * sy
  };
}

// ─── DRAW ────────────────────────────────────────────────────────────────────
function drawArc(startA, endA, ro, ri) {
  ctx.beginPath();
  ctx.arc(CX, CY, ro, startA, endA, false);
  ctx.arc(CX, CY, ri, endA, startA, true);
  ctx.closePath();
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // ── Outer decorative ring ──
  ctx.save();
  ctx.beginPath();
  ctx.arc(CX, CY, R_OUT+40, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([3,12]);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // ── Category arcs (static) ──
  const R_CAT_IN = R_OUT + 8, R_CAT_OUT = R_OUT + 30;
  CATS.forEach(cat => {
    const sa = START_ANGLE + cat.start * SLICE + wheelAngle + 0.04;
    const ea = START_ANGLE + (cat.start + cat.count) * SLICE + wheelAngle - 0.04;
    ctx.save();
    drawArc(sa, ea, R_CAT_OUT, R_CAT_IN);
    ctx.fillStyle = cat.trackFill;
    ctx.fill();
    ctx.strokeStyle = cat.ringColor;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Category label along arc
    const midA = (sa + ea) / 2;
    const lx = CX + (R_CAT_IN + R_CAT_OUT)/2 * Math.cos(midA);
    const ly = CY + (R_CAT_IN + R_CAT_OUT)/2 * Math.sin(midA);
    ctx.translate(lx, ly);
    ctx.rotate(midA + Math.PI/2);
    ctx.font = 'bold 9px Barlow Condensed, sans-serif';
    ctx.fillStyle = cat.ringColor.replace('0.55','1');
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.letterSpacing = '2px';
    ctx.fillText(cat.label.toUpperCase(), 0, 0);
    ctx.restore();
  });

  // ── Segments ──
  SEGS.forEach((seg, i) => {
    const sa = START_ANGLE + i * SLICE + GAP + wheelAngle;
    const ea = START_ANGLE + (i+1) * SLICE - GAP + wheelAngle;
    const ma = (sa + ea) / 2;
    const isHov = (i === hoveredIdx || i === pinnedIdx);
    const scale = isHov ? 1.12 : 1.0;

    ctx.save();
    if (scale !== 1.0) {
      // Scale from segment midpoint
      const smx = CX + (R_OUT+R_IN)/2 * Math.cos(ma);
      const smy = CY + (R_OUT+R_IN)/2 * Math.sin(ma);
      ctx.translate(smx, smy);
      ctx.scale(scale, scale);
      ctx.translate(-smx, -smy);
    }

    // Segment fill
    drawArc(sa, ea, R_OUT, R_IN);
    const gr = makeGrad(ma, seg.g[0], seg.g[1]);
    ctx.fillStyle = gr;
    ctx.fill();

    // Stroke
    ctx.strokeStyle = 'rgba(255,255,255,0.22)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Glow shadow on hovered
    if (isHov) {
      ctx.save();
      ctx.shadowColor = 'rgba(255,255,255,0.6)';
      ctx.shadowBlur = 20;
      drawArc(sa, ea, R_OUT, R_IN);
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.restore();
    }

    // Shimmer highlight
    ctx.beginPath();
    ctx.arc(CX, CY, R_OUT-9, sa+0.05, ea-0.05, false);
    ctx.strokeStyle = 'rgba(255,255,255,0.22)';
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Arrow chevron at end
    const aA = ea - 0.03;
    const aMidR = (R_OUT+R_IN)/2;
    const apx = CX + aMidR * Math.cos(aA);
    const apy = CY + aMidR * Math.sin(aA);
    const tAng = aA + Math.PI/2;
    const sz = 8;
    ctx.beginPath();
    ctx.moveTo(apx + sz*Math.cos(tAng), apy + sz*Math.sin(tAng));
    ctx.lineTo(apx + sz*.65*Math.cos(tAng+2.45), apy + sz*.65*Math.sin(tAng+2.45));
    ctx.lineTo(apx + sz*.65*Math.cos(tAng-2.45), apy + sz*.65*Math.sin(tAng-2.45));
    ctx.closePath();
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fill();

    // ── Badge circle ──
    const bx = CX + R_BADGE * Math.cos(ma);
    const by = CY + R_BADGE * Math.sin(ma);
    ctx.beginPath();
    ctx.arc(bx, by, BADGE_R, 0, Math.PI*2);
    ctx.fillStyle = seg.badgeCol;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // ── Icon inside badge ──
    ctx.save();
    ctx.translate(bx, by);
    ctx.rotate(ma + Math.PI/2);
    const ic = BADGE_R * 1.3 / 24;
    ctx.scale(ic, ic);
    ctx.translate(-12, -12);
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.fill(iconPaths[i]);
    ctx.restore();

    // ── Text label ──
    const lR = R_OUT - 40;
    const lx = CX + lR * Math.cos(ma);
    const ly = CY + lR * Math.sin(ma);
    ctx.save();
    ctx.translate(lx, ly);
    ctx.rotate(ma + Math.PI/2);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Step
    ctx.font = '500 8px Barlow, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillText(seg.step.toUpperCase(), 0, seg.name.includes('\n') ? -22 : -14);

    // Name
    const lines = seg.name.split('\n');
    lines.forEach((ln, li) => {
      ctx.font = 'bold 12.5px Barlow Condensed, sans-serif';
      ctx.fillStyle = '#ffffff';
      ctx.fillText(ln, 0, (seg.name.includes('\n') ? -8 : 0) + li * 15);
    });
    ctx.restore();

    // Boundary dot
    const bd_a = START_ANGLE + i * SLICE + wheelAngle;
    const bd_r = (R_OUT+R_IN)/2;
    ctx.beginPath();
    ctx.arc(CX + bd_r*Math.cos(bd_a), CY + bd_r*Math.sin(bd_a), 4, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fill();

    ctx.restore();
  });

  // ── White centre disc ──
  ctx.save();
  ctx.beginPath();
  ctx.arc(CX, CY, R_IN-6, 0, Math.PI*2);
  ctx.shadowColor = 'rgba(0,0,0,0.15)';
  ctx.shadowBlur = 12;
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,30,80,0.08)';
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.restore();
}

// ─── ANIMATION LOOP ──────────────────────────────────────────────────────────
function loop(ts) {
  if (!lastTime) lastTime = ts;
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;
  if (!isDragging) {
    wheelAngle += (autoSpin + velocity) * (dt / 16.67);
    velocity *= 0.97;
    if (Math.abs(velocity) < 0.001) velocity = 0;
  }
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ─── INTERACTION ─────────────────────────────────────────────────────────────
cv.addEventListener('mousemove', e => {
  if (isDragging) return;
  const p = getEventPos(e);
  const idx = hitTest(p.x, p.y);
  if (idx !== hoveredIdx) {
    hoveredIdx = idx;
    if (pinnedIdx < 0) {
      if (idx >= 0) showDetail(idx); else clearDetail();
    }
  }
});

cv.addEventListener('mouseleave', () => {
  hoveredIdx = -1;
  if (pinnedIdx < 0) clearDetail();
});

cv.addEventListener('click', e => {
  if (wasDragging) return;
  const p = getEventPos(e);
  const idx = hitTest(p.x, p.y);
  if (idx < 0) { pinnedIdx = -1; clearDetail(); return; }
  if (pinnedIdx === idx) { pinnedIdx = -1; clearDetail(); }
  else { pinnedIdx = idx; showDetail(idx); }
});

cv.addEventListener('mousedown', e => {
  const p = getEventPos(e);
  if (Math.sqrt((p.x-CX)**2+(p.y-CY)**2) < R_IN) return;
  isDragging = true; wasDragging = false;
  dragStartAngle = getEventAngle(e) - wheelAngle;
  dragLastAngle = getEventAngle(e);
  lastDragTime = performance.now();
  velocity = 0;
  cv.classList.add('dragging');
  e.preventDefault();
});

window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const a = getEventAngle(e);
  const nw = a - dragStartAngle;
  if (Math.abs(nw - wheelAngle) > 0.005) wasDragging = true;
  const now = performance.now(), el = now - lastDragTime;
  if (el > 0) dragVel = (a - dragLastAngle) / el * 16.67;
  dragLastAngle = a; lastDragTime = now;
  wheelAngle = nw;
});

window.addEventListener('mouseup', () => {
  if (!isDragging) return;
  isDragging = false;
  cv.classList.remove('dragging');
  velocity = dragVel * 0.6;
});

// Touch
cv.addEventListener('touchstart', e => {
  const t = e.touches[0];
  isDragging = true; wasDragging = false;
  dragStartAngle = getEventAngle(t) - wheelAngle;
  dragLastAngle = getEventAngle(t);
  lastDragTime = performance.now(); velocity = 0;
  e.preventDefault();
}, {passive:false});
cv.addEventListener('touchmove', e => {
  if (!isDragging) return;
  const t = e.touches[0], a = getEventAngle(t);
  const now = performance.now(), el = now-lastDragTime;
  if (el>0) dragVel = (a-dragLastAngle)/el*16.67;
  dragLastAngle = a; lastDragTime = now;
  wheelAngle = a - dragStartAngle; wasDragging = true;
  e.preventDefault();
}, {passive:false});
cv.addEventListener('touchend', () => { isDragging=false; velocity=dragVel*0.6; });

// Buttons
document.getElementById('btnCW').addEventListener('click', () => {
  autoSpin=0.45;
  document.getElementById('btnCW').classList.add('active');
  document.getElementById('btnCCW').classList.remove('active');
  document.getElementById('btnStop').classList.remove('active');
});
document.getElementById('btnCCW').addEventListener('click', () => {
  autoSpin=-0.45;
  document.getElementById('btnCCW').classList.add('active');
  document.getElementById('btnCW').classList.remove('active');
  document.getElementById('btnStop').classList.remove('active');
});
document.getElementById('btnStop').addEventListener('click', () => {
  autoSpin=0; velocity=0;
  document.getElementById('btnStop').classList.add('active');
  document.getElementById('btnCW').classList.remove('active');
  document.getElementById('btnCCW').classList.remove('active');
});

// ─── DETAIL PANEL ────────────────────────────────────────────────────────────
const dp = document.getElementById('dp');
const pc = document.getElementById('pc');

function showDetail(idx) {
  const s = SEGS[idx];
  dp.style.setProperty('--accent', s.color);
  pc.style.animation = 'none'; pc.offsetHeight; pc.style.animation = '';
  pc.innerHTML = `
    <div class="dp-header" style="background:${s.color}">
      <div class="dp-cat">${s.cat}</div>
      <div class="dp-step">${s.step} · Crew Management</div>
      <div class="dp-title">${s.label}</div>
    </div>
    <div class="dp-body">
      <div class="dp-desc">${s.desc}</div>
      <div class="dp-feat-title">Key Features</div>
      <ul class="dp-feats">${s.feats.map(f=>`<li>${f}</li>`).join('')}</ul>
    </div>`;
}
function clearDetail() {
  dp.style.setProperty('--accent','#0055a5');
  pc.innerHTML = `
    <div class="dp-header">
      <div class="dp-cat">Crew Management</div>
      <div class="dp-step">Hover a segment</div>
      <div class="dp-title">Select a Module</div>
    </div>
    <div class="dp-body">
      <div class="dp-desc">Hover over any segment to explore each module's capabilities.</div>
      <div class="dp-feat-title">Quick Tips</div>
      <ul class="dp-feats">
        <li>Drag the wheel to spin freely</li>
        <li>Click a segment to pin details</li>
        <li>Use CW / CCW for auto-rotation</li>
      </ul>
    </div>`;
}

// Default state
showDetail(0);
</script>
